<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose Your House!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  //fonts.googleapis.com">
  //fonts.gstatic.com" crossorigin>
  //fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Cinzel', serif;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%),
        linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      color: #f4e4bc;
      margin: 0;
      padding: 1.5rem;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse">ircle cx="25" cy="25" r="1" fill="%23ffffff" opacity="0.03"/>ircle cx="75" cy="75" r="0.5" fill="%23ffffff" opacity="0.02"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
      pointer-events: none;
      z-index: -1;
    }
    h1 {
      text-align: center;
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 700;
      margin-bottom: 2.5rem;
      text-shadow: 
        0 0 10px rgba(255,215,0,0.6),
        2px 2px 4px rgba(0,0,0,0.8);
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #ffd700, #ff6b35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }
    h1::after {
      content: '✦ Hogwarts Open Day ✦';
      display: block;
      font-size: 0.4em;
      font-weight: 400;
      opacity: 0.7;
      margin-top: 0.5rem;
    }
    .houses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      max-width: 1300px;
      margin: 0 auto;
    }
    .house-card {
      perspective: 1200px;
      height: 450px;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.9s cubic-bezier(0.25,0.46,0.45,0.94);
      transform-style: preserve-3d;
      cursor: pointer;
    }
    .house-card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 24px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 
        0 25px 50px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.1);
      transition: all 0.4s ease;
      border: 3px solid transparent;
    }
    .card-face:hover {
      transform: translateY(-8px);
    }
    .front {
      background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      backdrop-filter: blur(12px);
      border-image: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent) 1;
    }
    .back {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      transform: rotateY(180deg);
      border: 2px solid rgba(255,255,255,0.15);
    }
    .house-logo {
      width: 160px;
      height: 160px;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
      border-radius: 16px;
      transition: transform 0.3s ease;
    }
    .card-face:hover .house-logo {
      transform: scale(1.05);
    }
    .house-name {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      text-shadow: 0 4px 8px rgba(0,0,0,0.7);
      letter-spacing: 0.02em;
    }
    .house-tagline {
      font-size: 1rem;
      opacity: 0.85;
      margin-bottom: 1.5rem;
      font-style: italic;
    }
    .back label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
      color: #d1d5db;
      text-align: left;
      width: 100%;
      font-weight: 500;
    }
    .back input,
    .back select {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: 2px solid rgba(75,85,99,0.4);
      background: rgba(2,6,23,0.9);
      color: #f4e4bc;
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: 1rem;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }
    .back input:focus,
    .back select:focus {
      outline: none;
      border-color: rgba(255,215,0,0.6);
      box-shadow: 0 0 0 3px rgba(255,215,0,0.1);
    }
    .back input[type="number"] {
      -moz-appearance: textfield;
    }
    .back input[type="number"]::-webkit-outer-spin-button,
    .back input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .back button {
      width: 100%;
      padding: 1rem;
      border-radius: 16px;
      border: none;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #ffd700, #ff6b35);
      color: #1a1a2e;
      font-family: inherit;
      box-shadow: 0 8px 20px rgba(255,215,0,0.3);
      transition: all 0.3s ease;
    }
    .back button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(255,215,0,0.4);
    }
    .back button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .message {
      margin-top: 1rem;
      font-size: 0.95rem;
      text-align: center;
      padding: 0.75rem;
      border-radius: 8px;
    }
    .message.success {
      background: rgba(34,197,94,0.2);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.3);
    }
    .message.error {
      background: rgba(248,113,113,0.2);
      color: #f97316;
      border: 1px solid rgba(248,113,113,0.3);
    }
    small.hint {
      display: block;
      margin-top: -0.25rem;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: #9ca3af;
      text-align: left;
      font-style: italic;
    }
    @media (max-width: 480px) {
      .houses-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      .house-card {
        height: 420px;
      }
    }
  </style>
</head>
<body>
  <h1>Choose Your House</h1>

  <div class="houses-grid">
    <!-- Gryffindor -->
    <div class="house-card" data-house="Gryffindor">
      <div

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose Your House!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0b1120 0%, #1e3a8a 100%);
      color: #e5e7eb;
      margin: 0;
      padding: 1rem;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      font-size: clamp(1.8rem, 5vw, 3rem);
      margin-bottom: 2rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    .houses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .house-card {
      perspective: 1000px;
      height: 420px;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.8s;
      transform-style: preserve-3d;
      cursor: pointer;
    }
    .house-card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }
    .card-face:hover {
      transform: scale(1.02);
    }
    .front {
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
      border: 2px solid rgba(255,255,255,0.2);
    }
    .back {
      background: #111827;
      transform: rotateY(180deg);
      border: 2px solid #4b5563;
    }
    .house-logo {
      width: 140px;
      height: 140px;
      margin-bottom: 1rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }
    .house-name {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    .house-tagline {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 1rem;
    }
    .back label {
      display: block;
      margin-bottom: 0.25rem;
      font-size: 0.85rem;
      color: #d1d5db;
      text-align: left;
      width: 100%;
    }
    .back input,
    .back select {
      width: 100%;
      padding: 0.6rem;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
      box-sizing: border-box;
    }
    .back input[type="number"] {
      -moz-appearance: textfield;
    }
    .back input[type="number"]::-webkit-outer-spin-button,
    .back input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .back button {
      width: 100%;
      padding: 0.7rem;
      border-radius: 999px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #f97316, #eab308);
      color: #111827;
      margin-top: 0.3rem;
    }
    .back button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .message {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      text-align: center;
    }
    .message.success {
      color: #22c55e;
    }
    .message.error {
      color: #f97316;
    }
    small.hint {
      display: block;
      margin-top: -0.3rem;
      margin-bottom: 0.8rem;
      font-size: 0.75rem;
      color: #6b7280;
      text-align: left;
    }
    @media (max-width: 480px) {
      .houses-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .house-card {
        height: 380px;
      }
    }
  </style>
</head>
<body>
  <h1>Choose Your House</h1>

  <div class="houses-grid">
    <!-- Gryffindor -->
    <div class="house-card" data-house="Gryffindor">
      <div class="card-inner">
        <div class="card-face front" style="--house-color: #d32f2f;">
          <img src="https://via.placeholder.com/140x140/d32f2f/ffffff?text=🦁" class="house-logo" alt="Gryffindor">
          <div class="house-name" style="color: #d32f2f;">Gryffindor</div>
          <div class="house-tagline">Brave at heart</div>
        </div>
        <div class="card-face back">
          <!-- Form content will be inserted here by JS -->
        </div>
      </div>
    </div>

    <!-- Slytherin -->
    <div class="house-card" data-house="Slytherin">
      <div class="card-inner">
        <div class="card-face front" style="--house-color: #2d5016;">
          <img src="https://via.placeholder.com/140x140/2d5016/ffffff?text=🐍" class="house-logo" alt="Slytherin">
          <div class="house-name" style="color: #2d5016;">Slytherin</div>
          <div class="house-tagline">Cunning ambition</div>
        </div>
        <div class="card-face back">
          <!-- Form content will be inserted here by JS -->
        </div>
      </div>
    </div>

    <!-- Ravenclaw -->
    <div class="house-card" data-house="Ravenclaw">
      <div class="card-inner">
        <div class="card-face front" style="--house-color: #3f76e4;">
          <img src="https://via.placeholder.com/140x140/3f76e4/ffffff?text=🦅" class="house-logo" alt="Ravenclaw">
          <div class="house-name" style="color: #3f76e4;">Ravenclaw</div>
          <div class="house-tagline">Wit beyond measure</div>
        </div>
        <div class="card-face back">
          <!-- Form content will be inserted here by JS -->
        </div>
      </div>
    </div>

    <!-- Hufflepuff -->
    <div class="house-card" data-house="Hufflepuff">
      <div class="card-inner">
        <div class="card-face front" style="--house-color: #ecb92b;">
          <img src="https://via.placeholder.com/140x140/ecb92b/111827?text=🦡" class="house-logo" alt="Hufflepuff">
          <div class="house-name" style="color: #ecb92b;">Hufflepuff</div>
          <div class="house-tagline">Loyal and hardworking</div>
        </div>
        <div class="card-face back">
          <!-- Form content will be inserted here by JS -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvno4sxZbFccn1HYTeJZKyClxRpzfKiud5vD5f4DGpjdLCU0K6O5lVJcUGXxzXmIkvhw/exec"; // paste Apps Script URL

    const houseCards = document.querySelectorAll('.house-card');
    let currentFlipped = null;

    // Form template
    const formTemplate = (houseName) => `
      <form id="house-form">
        abel for="gmail">Your Gmail ID (required)</label>
        <input type="email" id="gmail" name="gmail" required placeholder="example@gmail.com">
        <small class="hint">Used to identify winners. One entry per Gmail ID.</small>

        abel for="name">Name (optional)</label>
        <input type="text" id="name" name="name" placeholder="Your name">

        abel for="guess">Your guess for ${houseName}</label>
        <input type="number" id="guess" name="guess" min="1" max="1000" required placeholder="How many people will choose ${houseName} today?">
        <small class="hint">Think about what others will pick, not just your favourite house.</small>

        <button type="submit" id="submit-btn">Submit for ${houseName}</button>

        <div id="message" class="message" aria-live="polite"></div>
      </form>
    `;

    function isValidGmail(value) {
      const trimmed = value.trim();
      return /^[a-zA-Z0-9._%+-]+@gmail\.com$/.test(trimmed);
    }

    houseCards.forEach(card => {
      const front = card.querySelector('.front');
      const back = card.querySelector('.back');
      const houseName = card.dataset.house;

      // Insert form into back
      back.innerHTML = formTemplate(houseName);

      front.addEventListener('click', () => {
        // Close current flipped card
        if (currentFlipped && currentFlipped !== card) {
          currentFlipped.classList.remove('flipped');
        }
        
        // Toggle this card
        card.classList.toggle('flipped');
        currentFlipped = card.classList.contains('flipped') ? card : null;
      });

      // Handle form submission (dynamic per card)
      back.addEventListener('submit', function(event) {
        event.preventDefault();
        const form = event.target;
        const messageEl = form.querySelector('#message');
        const submitBtn = form.querySelector('#submit-btn');
        const gmailInput = form.querySelector('#gmail');

        messageEl.textContent = "";
        messageEl.className = "message";

        // Front-end validation
        const gmailValue = gmailInput.value;
        if (!isValidGmail(gmailValue)) {
          messageEl.textContent = "Please enter a valid @gmail.com address.";
          messageEl.className = "message error";
          gmailInput.focus();
          return;
        }

        if (!form.reportValidity()) return;

        submitBtn.disabled = true;
        submitBtn.textContent = "Submitting...";

        const formData = new FormData(form);
        formData.append('house', houseName);

        fetch(SCRIPT_URL, {
          method: "POST",
          body: formData
        })
          .then(async (res) => {
            let text;
            try {
              text = await res.text();
              const data = JSON.parse(text);
              if (data.status === "success") {
                messageEl.textContent = data.message || "Your choice has been recorded. Good luck!";
                messageEl.className = "message success";
                form.reset();
              } else {
                messageEl.textContent = data.message || "We already have an entry from this Gmail ID.";
                messageEl.className = "message error";
              }
            } catch (e) {
              messageEl.textContent = "Your choice has been recorded (fallback).";
              messageEl.className = "message success";
              form.reset();
            }
          })
          .catch((err) => {
            console.error(err);
            messageEl.textContent = "Something went wrong. Please try again.";
            messageEl.className = "message error";
          })
          .finally(() => {
            submitBtn.disabled = false;
            submitBtn.textContent = `Submit for ${houseName}`;
          });
      });
    });
  </script>
</body>
</html>
